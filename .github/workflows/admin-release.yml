name: Build Admin App

on:
  push:
    paths:
      - 'mobile/admin-app/**'
      - '.github/workflows/admin-release.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x mobile/admin-app/gradlew

      - name: Build with Gradle
        run: ./build_admin.sh
        working-directory: mobile/admin-app

      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.ADMIN_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ADMIN_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ADMIN_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ADMIN_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > admin.jks
          BUILD_TOOLS=$ANDROID_HOME/build-tools/34.0.0
          APK_PATH=mobile/admin-app/app/build/outputs/apk/release/app-release-unsigned.apk
          SIGNED_APK=mobile/admin-app/app/build/outputs/apk/release/app-release.apk
          $BUILD_TOOLS/zipalign -v -p 4 $APK_PATH $SIGNED_APK
          $BUILD_TOOLS/apksigner sign --ks admin.jks --ks-pass pass:$KEYSTORE_PASSWORD --ks-key-alias $KEY_ALIAS --key-pass pass:$KEY_PASSWORD $SIGNED_APK

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: admin-app-release
          path: mobile/admin-app/app/build/outputs/apk/release/app-release.apk
