name: Build Admin App

on:
  push:
    paths:
      - 'mobile/admin-app/**'
      - '.github/workflows/admin-release.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x mobile/admin-app/gradlew

      - name: Build with Gradle
        run: ./build_admin.sh
        working-directory: mobile/admin-app

      - name: Sign APK
        uses: illyaskel/action-android-sign@v1.0.0
        id: sign_app
        with:
          releaseDirectory: mobile/admin-app/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ADMIN_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ADMIN_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ADMIN_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ADMIN_KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: admin-app-release
          path: ${{steps.sign_app.outputs.signedReleaseFile}}
