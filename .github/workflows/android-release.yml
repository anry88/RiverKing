name: Android Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: >
      (github.event_name == 'workflow_dispatch' && github.ref_name == 'main') ||
      (github.event_name == 'push' && github.ref_name == 'main')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set +o pipefail
          yes | sdkmanager --licenses > /dev/null
          set -o pipefail
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

          SDK_DIR="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          [[ -n "$SDK_DIR" ]] || { echo "::error::Android SDK path is not available"; exit 1; }
          printf 'sdk.dir=%s\n' "$SDK_DIR" > mobile/android-app/local.properties

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -a
          source mobile/android-app/version.properties
          set +a

          [[ -n "${RIVERKING_VERSION_CODE:-}" ]] || { echo "::error::Missing RIVERKING_VERSION_CODE in version.properties"; exit 1; }
          [[ -n "${RIVERKING_VERSION_NAME:-}" ]] || { echo "::error::Missing RIVERKING_VERSION_NAME in version.properties"; exit 1; }

          echo "version_code=$RIVERKING_VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "version_name=$RIVERKING_VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "release_tag=android-v${RIVERKING_VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_name=Android ${RIVERKING_VERSION_NAME} (${RIVERKING_VERSION_CODE})" >> "$GITHUB_OUTPUT"

      - name: Validate Android update policy
        shell: bash
        run: python3 mobile/android-app/scripts/check-update-policy.py

      - name: Prepare signing secrets
        shell: bash
        env:
          RIVERKING_SIGNING_KEYSTORE_BASE64: ${{ secrets.RIVERKING_SIGNING_KEYSTORE_BASE64 }}
          RIVERKING_SIGNING_STORE_PASSWORD: ${{ secrets.RIVERKING_SIGNING_STORE_PASSWORD }}
          RIVERKING_SIGNING_KEY_ALIAS: ${{ secrets.RIVERKING_SIGNING_KEY_ALIAS }}
          RIVERKING_SIGNING_KEY_PASSWORD: ${{ secrets.RIVERKING_SIGNING_KEY_PASSWORD }}
          RIVERKING_GOOGLE_AUTH_CLIENT_ID: ${{ secrets.RIVERKING_GOOGLE_AUTH_CLIENT_ID }}
        run: |
          [[ -n "$RIVERKING_SIGNING_KEYSTORE_BASE64" ]] || { echo "::error::Missing secret RIVERKING_SIGNING_KEYSTORE_BASE64"; exit 1; }
          [[ -n "$RIVERKING_SIGNING_STORE_PASSWORD" ]] || { echo "::error::Missing secret RIVERKING_SIGNING_STORE_PASSWORD"; exit 1; }
          [[ -n "$RIVERKING_SIGNING_KEY_ALIAS" ]] || { echo "::error::Missing secret RIVERKING_SIGNING_KEY_ALIAS"; exit 1; }
          [[ -n "$RIVERKING_SIGNING_KEY_PASSWORD" ]] || { echo "::error::Missing secret RIVERKING_SIGNING_KEY_PASSWORD"; exit 1; }

          mkdir -p "$HOME/.gradle" "$RUNNER_TEMP/riverking"
          KEYSTORE_PATH="$RUNNER_TEMP/riverking/riverking-release.jks"
          printf '%s' "$RIVERKING_SIGNING_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"

          {
            echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8"
            echo "android.useAndroidX=true"
            echo "kotlin.code.style=official"
            echo "android.nonTransitiveRClass=true"
            echo "RIVERKING_SIGNING_STORE_FILE=$KEYSTORE_PATH"
            echo "RIVERKING_SIGNING_STORE_PASSWORD=$RIVERKING_SIGNING_STORE_PASSWORD"
            echo "RIVERKING_SIGNING_KEY_ALIAS=$RIVERKING_SIGNING_KEY_ALIAS"
            echo "RIVERKING_SIGNING_KEY_PASSWORD=$RIVERKING_SIGNING_KEY_PASSWORD"
            echo "RIVERKING_GOOGLE_AUTH_CLIENT_ID=$RIVERKING_GOOGLE_AUTH_CLIENT_ID"
          } >> "$HOME/.gradle/gradle.properties"

      - name: Write CI prod profile
        shell: bash
        env:
          PROD_API_BASE_URL_VAR: ${{ vars.RIVERKING_PROD_API_BASE_URL }}
          PROD_API_BASE_URL_SECRET: ${{ secrets.RIVERKING_PROD_API_BASE_URL }}
          PROD_PUBLIC_WEB_URL_VAR: ${{ vars.RIVERKING_PROD_PUBLIC_WEB_URL }}
          PROD_PUBLIC_WEB_URL_SECRET: ${{ secrets.RIVERKING_PROD_PUBLIC_WEB_URL }}
          PROD_ITCH_PROJECT_URL_VAR: ${{ vars.RIVERKING_PROD_ITCH_PROJECT_URL }}
          PROD_ITCH_PROJECT_URL_SECRET: ${{ secrets.RIVERKING_PROD_ITCH_PROJECT_URL }}
          PROD_PLAY_STORE_URL_VAR: ${{ vars.RIVERKING_PROD_PLAY_STORE_URL }}
          PROD_PLAY_STORE_URL_SECRET: ${{ secrets.RIVERKING_PROD_PLAY_STORE_URL }}
          PROD_SUPPORT_URL_VAR: ${{ vars.RIVERKING_PROD_SUPPORT_URL }}
          PROD_SUPPORT_URL_SECRET: ${{ secrets.RIVERKING_PROD_SUPPORT_URL }}
          PROD_PRIVACY_POLICY_URL_VAR: ${{ vars.RIVERKING_PROD_PRIVACY_POLICY_URL }}
          PROD_PRIVACY_POLICY_URL_SECRET: ${{ secrets.RIVERKING_PROD_PRIVACY_POLICY_URL }}
          PROD_ACCOUNT_DELETION_URL_VAR: ${{ vars.RIVERKING_PROD_ACCOUNT_DELETION_URL }}
          PROD_ACCOUNT_DELETION_URL_SECRET: ${{ secrets.RIVERKING_PROD_ACCOUNT_DELETION_URL }}
        run: |
          resolve_value() {
            local primary="$1"
            local fallback="$2"
            if [[ -n "$primary" ]]; then
              printf '%s' "$primary"
            else
              printf '%s' "$fallback"
            fi
          }

          PROD_API_BASE_URL="$(resolve_value "$PROD_API_BASE_URL_VAR" "$PROD_API_BASE_URL_SECRET")"
          PROD_PUBLIC_WEB_URL="$(resolve_value "$PROD_PUBLIC_WEB_URL_VAR" "$PROD_PUBLIC_WEB_URL_SECRET")"
          PROD_ITCH_PROJECT_URL="$(resolve_value "$PROD_ITCH_PROJECT_URL_VAR" "$PROD_ITCH_PROJECT_URL_SECRET")"
          PROD_PLAY_STORE_URL="$(resolve_value "$PROD_PLAY_STORE_URL_VAR" "$PROD_PLAY_STORE_URL_SECRET")"
          PROD_SUPPORT_URL="$(resolve_value "$PROD_SUPPORT_URL_VAR" "$PROD_SUPPORT_URL_SECRET")"
          PROD_PRIVACY_POLICY_URL="$(resolve_value "$PROD_PRIVACY_POLICY_URL_VAR" "$PROD_PRIVACY_POLICY_URL_SECRET")"
          PROD_ACCOUNT_DELETION_URL="$(resolve_value "$PROD_ACCOUNT_DELETION_URL_VAR" "$PROD_ACCOUNT_DELETION_URL_SECRET")"

          [[ -n "$PROD_API_BASE_URL" ]] || { echo "::error::Missing RIVERKING_PROD_API_BASE_URL repository variable/secret"; exit 1; }
          [[ -n "$PROD_PUBLIC_WEB_URL" ]] || { echo "::error::Missing RIVERKING_PROD_PUBLIC_WEB_URL repository variable/secret"; exit 1; }

          mkdir -p mobile/android-app/profiles
          {
            echo "RIVERKING_API_BASE_URL=$PROD_API_BASE_URL"
            echo "RIVERKING_PUBLIC_WEB_URL=$PROD_PUBLIC_WEB_URL"
            if [[ -n "$PROD_ITCH_PROJECT_URL" ]]; then
              echo "RIVERKING_ITCH_PROJECT_URL=$PROD_ITCH_PROJECT_URL"
            fi
            if [[ -n "$PROD_PLAY_STORE_URL" ]]; then
              echo "RIVERKING_PLAY_STORE_URL=$PROD_PLAY_STORE_URL"
            fi
            if [[ -n "$PROD_SUPPORT_URL" ]]; then
              echo "RIVERKING_SUPPORT_URL=$PROD_SUPPORT_URL"
            fi
            if [[ -n "$PROD_PRIVACY_POLICY_URL" ]]; then
              echo "RIVERKING_PRIVACY_POLICY_URL=$PROD_PRIVACY_POLICY_URL"
            fi
            if [[ -n "$PROD_ACCOUNT_DELETION_URL" ]]; then
              echo "RIVERKING_ACCOUNT_DELETION_URL=$PROD_ACCOUNT_DELETION_URL"
            fi
          } > mobile/android-app/profiles/prod.properties

      - name: Build Android release artifacts
        shell: bash
        env:
          RIVERKING_GIT_BRANCH: main
        run: |
          mobile/android-app/scripts/build-android.sh --profile prod release-artifacts --console=plain

      - name: Write release metadata
        shell: bash
        run: |
          MIN_SUPPORTED_VERSION_CODE="$(python3 -c 'import json; print(json.load(open("src/main/resources/android-update-policy.json"))["minSupportedVersionCode"])')"
          REQUIRE_VERSION_HEADERS="$(python3 -c 'import json; print(str(json.load(open("src/main/resources/android-update-policy.json")).get("requireVersionHeaders", False)).lower())')"
          cat > mobile/android-app/dist/prod/release-metadata.txt <<EOF
          version_name=${{ steps.version.outputs.version_name }}
          version_code=${{ steps.version.outputs.version_code }}
          min_supported_version_code=$MIN_SUPPORTED_VERSION_CODE
          require_version_headers=$REQUIRE_VERSION_HEADERS
          git_sha=${{ github.sha }}
          source_event=${{ github.event_name }}
          workflow_run=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ steps.version.outputs.version_name }}
          if-no-files-found: error
          path: |
            mobile/android-app/dist/prod/app-riverking-${{ steps.version.outputs.version_name }}.apk
            mobile/android-app/dist/prod/app-riverking-${{ steps.version.outputs.version_name }}.aab
            mobile/android-app/dist/prod/release-metadata.txt
            src/main/resources/android-update-policy.json

      - name: Create or update draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: ${{ steps.version.outputs.release_name }}
          draft: true
          generate_release_notes: true
          files: |
            mobile/android-app/dist/prod/app-riverking-${{ steps.version.outputs.version_name }}.apk
            mobile/android-app/dist/prod/app-riverking-${{ steps.version.outputs.version_name }}.aab
            mobile/android-app/dist/prod/release-metadata.txt
            src/main/resources/android-update-policy.json
