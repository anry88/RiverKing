# Full example Android build properties file.
# Copy this file to ~/.gradle/gradle.properties or merge the needed
# entries into your own Gradle properties setup.
#
# Note: Android SDK location is not configured here. Keep sdk.dir in
# mobile/android-app/local.properties on each machine.

# Gradle / Android defaults used by this nested project.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# Backend base URL used by the Android client.
# For the Android emulator talking to a locally running backend:
RIVERKING_API_BASE_URL=http://10.0.2.2:8080

# Optional: enable Google sign-in in the Android client.
# Leave blank to disable Google auth in BuildConfig.
RIVERKING_GOOGLE_AUTH_CLIENT_ID=

# Optional: release signing. Leave blank for local debug builds.
RIVERKING_SIGNING_STORE_FILE=/absolute/path/to/release.keystore
RIVERKING_SIGNING_STORE_PASSWORD=
RIVERKING_SIGNING_KEY_ALIAS=
RIVERKING_SIGNING_KEY_PASSWORD=
