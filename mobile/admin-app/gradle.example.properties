# Example Gradle properties for the internal RiverKing admin app.
# Copy relevant entries to ~/.gradle/gradle.properties or keep machine-local
# Android SDK configuration in mobile/admin-app/local.properties.
#
# The backend URL and ADMIN_API_TOKEN are configured inside the app as saved
# server profiles; they are intentionally not compiled into BuildConfig.

org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# Optional: release signing if you want local signed release APKs.
# The current build file does not require these for debug builds.
RIVERKING_ADMIN_SIGNING_STORE_FILE=/absolute/path/to/admin.keystore
RIVERKING_ADMIN_SIGNING_STORE_PASSWORD=
RIVERKING_ADMIN_SIGNING_KEY_ALIAS=
RIVERKING_ADMIN_SIGNING_KEY_PASSWORD=
