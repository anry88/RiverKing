<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>RiverKing — Mini App (Fishing-first)</title>

  <!-- Telegram + libs -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --tg-bg: #0e0f13;
      --vh: 100dvh;
      --safe-top: 0px;
      --safe-bottom: 0px;
      --safe-top-fb: 0px;
      /* visualViewport fallback */
      --safe-bottom-fb: 0px;
      /* visualViewport fallback */
      --bottom-gap: 0px;
      --overlay: 0;
      --overlay-shift: calc(var(--overlay) * 4px);
      --ui-scale: calc(1 + 0.05 * var(--overlay));
      --tg-topbar: 0px;
      /* высота верхнего бара Telegram, если не удаётся вычислить иначе */

      /* удобные «максимумы» */
      --safe-top-max: max(env(safe-area-inset-top, 0px), var(--safe-top-fb));
      --safe-bottom-max: max(env(safe-area-inset-bottom, 0px), var(--safe-bottom-fb));
      --safe-top-ui: var(--safe-top-max);
      --safe-top-overlay: calc(var(--safe-top-max) + var(--tg-topbar));
    }

    /* старый iOS (constant) — на всякий случай */
    @supports (padding: constant(safe-area-inset-top)) {
      :root {
        --safe-top-max: max(constant(safe-area-inset-top), var(--safe-top-fb));
        --safe-bottom-max: max(constant(safe-area-inset-bottom), var(--safe-bottom-fb));
      }
    }

    html,
    body {
      height: var(--vh);
      margin: 0;
    }

    body {
      background: var(--tg-bg);
      color: #fff;
    }

    #root {
      height: 100%;
      box-sizing: border-box;
      overflow: auto;
      display: flex;
      flex-direction: column;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    @keyframes bob {
      0% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-6px);
      }

      100% {
        transform: translateY(0);
      }
    }

    @keyframes bite {
      0% {
        transform: translateY(0) rotate(0);
      }

      25% {
        transform: translateY(10px) rotate(-6deg);
      }

      50% {
        transform: translateY(-4px) rotate(6deg);
      }

      75% {
        transform: translateY(8px) rotate(-4deg);
      }

      100% {
        transform: translateY(0) rotate(0);
      }
    }

    @keyframes ripple {
      0% {
        opacity: .5;
        transform: scale(0.8);
      }

      100% {
        opacity: 0;
        transform: scale(2.3);
      }
    }

    .ripple::before,
    .ripple::after {
      content: "";
      position: absolute;
      inset: -6px;
      border-radius: 9999px;
      border: 2px solid rgba(255, 255, 255, .35);
      animation: ripple 2.2s linear infinite;
    }

    .ripple::after {
      animation-delay: 1.1s;
    }

    @keyframes tapPulse {
      0% {
        opacity: 0.45;
        transform: scale(0.75);
      }

      100% {
        opacity: 0;
        transform: scale(1.6);
      }
    }

    .tap-hint {
      position: absolute;
      inset: -10px;
      pointer-events: none;
      z-index: 5;
    }

    .tap-hint::before,
    .tap-hint::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 9999px;
      border: 2px solid rgba(255, 255, 255, .45);
      animation: tapPulse .45s ease-out infinite;
    }

    .tap-hint::after {
      animation-delay: .22s;
    }

    @keyframes tapWave {
      0% {
        opacity: 0.55;
        transform: scale(0.65);
      }

      100% {
        opacity: 0;
        transform: scale(1.7);
      }
    }

    .tap-visual {
      position: relative;
      height: 60px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tap-visual__ring {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 9999px;
      border: 2px solid rgba(255, 255, 255, .45);
      opacity: 0;
      animation: tapWave .75s ease-out infinite;
    }

    .tap-visual__ring--delay1 {
      animation-delay: .18s;
    }

    .tap-visual__ring--delay2 {
      animation-delay: .36s;
    }

    .tap-visual__dot {
      width: 16px;
      height: 16px;
      border-radius: 9999px;
      background: rgba(255, 255, 255, .55);
      box-shadow: 0 0 0 10px rgba(255, 255, 255, .14);
    }

    .bobber-cast {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }

    @keyframes pop {
      0% {
        transform: scale(.5);
        opacity: 0;
      }

      80% {
        transform: scale(1.05);
        opacity: 1;
      }

      100% {
        transform: scale(1);
      }
    }

    .animate-pop {
      animation: pop .3s ease-out;
    }

    .glass {
      background: linear-gradient(to bottom, rgba(255, 255, 255, .08), rgba(255, 255, 255, .04));
      box-shadow: 0 10px 30px rgba(0, 0, 0, .25);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, .12);
    }

    .pt-safe {
      padding-top: calc(var(--safe-top-ui) + (var(--overlay) * 10px));
    }

    .pb-safe {
      padding-bottom: calc(1rem + max(var(--safe-bottom-max), var(--bottom-gap)));
    }

    .sticky-safe {
      padding-bottom: calc(max(var(--safe-bottom-max), var(--bottom-gap)));
    }

    /* overlay-aware UI pieces */
    .app-header {
      height: calc(28px * var(--ui-scale) + var(--safe-top-ui) + var(--overlay-shift) + 13px);
      padding: 0 calc(16px * var(--ui-scale));
      padding-top: calc(var(--safe-top-ui) + var(--overlay-shift) + 8px);
      padding-bottom: 5px;
    }

    .app-footer {
      height: calc(64px * var(--ui-scale) + max(var(--safe-bottom-max), var(--bottom-gap)) + var(--overlay-shift) + 5px);
      box-sizing: border-box;
      padding: 5px calc(16px * var(--ui-scale)) calc(max(var(--safe-bottom-max), var(--bottom-gap)) + var(--overlay-shift) + 5px);
      display: flex;
      align-items: stretch;
      gap: 12px;
    }

    .app-footer-placeholder {
      height: calc(64px * var(--ui-scale) + max(var(--safe-bottom-max), var(--bottom-gap)) + var(--overlay-shift) + 5px);
      background: var(--tg-bg);
    }

    .app-content {
      flex: 1;
      min-height: 0;
      overflow: auto;
    }

    .pro-fishing-stage {
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .pro-safe-top {
      top: calc(12px + var(--safe-top-overlay));
    }

    .pro-safe-bottom-left {
      left: 12px;
      bottom: calc(12px + max(var(--safe-bottom-max), var(--bottom-gap)));
    }

    .pro-safe-bottom-right {
      right: 12px;
      bottom: calc(12px + max(var(--safe-bottom-max), var(--bottom-gap)));
    }

    .pro-safe-bottom-center {
      bottom: calc(56px + max(var(--safe-bottom-max), var(--bottom-gap)));
    }

    .btn-lg {
      font-size: calc(14px * var(--ui-scale));
      padding: calc(10px * var(--ui-scale)) calc(14px * var(--ui-scale));
      border-radius: calc(9px * var(--ui-scale));
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react" src="/app/scripts/shared.js"></script>
  <script type="text/babel" data-presets="env,react" src="/app/scripts/components.js"></script>
  <script type="text/babel" data-presets="env,react" src="/app/scripts/tabs/fishing.js"></script>
  <script type="text/babel" data-presets="env,react" src="/app/scripts/tabs/tournaments.js"></script>
  <script type="text/babel" data-presets="env,react" src="/app/scripts/tabs/ratings.js"></script>
  <script type="text/babel" data-presets="env,react" src="/app/scripts/tabs/guide.js"></script>
  <script type="text/babel" data-presets="env,react" src="/app/scripts/tabs/shop.js"></script>
  <script src="/app/config.js"></script>
  <script type="text/babel" data-presets="env,react" src="/app/scripts/analytics.js"></script>
  <script type="text/babel" data-presets="env,react" src="/app/scripts/app.jsx"></script>
</body>

</html>
