      const [size,setSize] = React.useState({w:0,h:0});
      React.useEffect(()=>{
        if(!ref.current) return;
        const ro = new ResizeObserver(([entry])=>{
          const cr = entry.contentRect; setSize({w: cr.width, h: cr.height});
        });
        ro.observe(ref.current);
        return ()=> ro.disconnect();
      },[ref]);
      return size;

    function FishingStage({me, setMe, casting, biting, onCast, onHook, onClaimDaily, autoCast, setAutoCast, autoCastRef, autoCastTimeoutRef}){
      const stageRef = React.useRef(null);
      const {w,h} = useResizeObserver(stageRef);

      const WATER_TOP_REL = 0.48; // верх воды
      const shorePosRel = React.useMemo(()=>({x: 0.12, y: WATER_TOP_REL - 0.02}),[]); // поплавок на берегу
      const [floatRel, setFloatRel] = React.useState(shorePosRel);
      const [tension, setTension] = React.useState(0.2);

      const toPx = (rel)=>({ x: rel.x * w, y: rel.y * h });
      const floatPx = toPx(floatRel);

      // === Удочка (спрайт): больше на 1.5x и начало в 2/3 ширины ===
      const isSmall = w < 420;
      const isTablet = w >= 420 && w < 1024;

      // базовые лимиты занимаемой площади (как раньше)
      const targetWFrac = isSmall ? 0.70 : (isTablet ? 0.55 : 0.48);
      const targetHFrac = isSmall ? 0.92 : (isTablet ? 0.90 : 0.86);

      // базовый масштаб, затем умножаем на 1.5
      const rodScaleBase = Math.min((w * targetWFrac) / 1200, (h * targetHFrac) / 1200);
      const rodScale = rodScaleBase * ROD_SIZE_MULT;

      const rodW = 1200 * rodScale;
      const rodH = 1200 * rodScale;

      // База удочки должна начинаться примерно на 2/3 ширины сцены
      const baseDesiredX = w * ROD_BASE_X_FRACTION;
      const rodLeft = baseDesiredX - rodW * ROD_BASE_ANCHOR.x;

      // ручка «из экрана»
      const rodBottomOvershoot = Math.min( Math.max(h * 0.08, 50), 140 ); // чуть больше верхнего предела
      const rodTop = h - rodH + rodBottomOvershoot;

      // координаты тюльпана в сцене
      const tipX = rodLeft + rodW * ROD_TIP_ANCHOR.x;
      const tipY = rodTop  + rodH * ROD_TIP_ANCHOR.y;

      // леска от тюльпана к поплавку
      const ctrl = {
        x: (tipX + floatPx.x) / 2 - (isSmall ? 24 : 40),
        y: (tipY + floatPx.y) / 2 + (isSmall ? 50 : (60 + 120 * tension))
      };
      const linePath = `M ${tipX},${tipY} Q ${ctrl.x},${ctrl.y} ${floatPx.x},${floatPx.y}`;

      // tween поплавка
      const tweenTo = (toRel, ms=600)=>{
        const from = {...floatRel};
        const start = performance.now();
        const step = (now)=>{
          const t = Math.min(1, (now - start)/ms);
          const k = easeOutCubic(t);
          setFloatRel({ x: from.x + (toRel.x - from.x)*k, y: from.y + (toRel.y - from.y)*k });
          if(t<1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      };

      React.useEffect(()=>{
        if(casting){
          const tipRelX = tipX / w;
          const minX = Math.max(0.05, tipRelX - 0.20);
          const maxX = Math.max(minX, tipRelX - 0.05);
          const target = {
            x: minX + Math.random() * (maxX - minX),
            y: WATER_TOP_REL + 0.12 + Math.random() * 0.18,
          };
          setTension(0.15 + Math.random() * 0.25);
          tweenTo(target, 650);
        } else {
          setFloatRel(shorePosRel);
          setTension(0.18);
        }
      }, [casting, shorePosRel, tipX, w]);

      const bgUrl = LOCATION_BG[me.locationId] || LOCATION_BG[1];
      const [bgLoaded, setBgLoaded] = React.useState(false);
      React.useEffect(() => {
        setBgLoaded(false);
        const img = new Image();
        img.src = bgUrl;
        img.onload = () => setBgLoaded(true);
      }, [bgUrl]);
      const bobberAnim = biting ? 'animate-[bite_0.6s_ease-in-out_infinite]' : (casting ? 'animate-[bob_3s_ease-in-out_infinite]' : '');
      const showRipple = casting && !biting;

      return (
        <div className="relative rounded-2xl overflow-hidden border border-white/10" ref={stageRef}
             style={{height:'56vh'}}>
          {/* Фон локации */}
          <div
            className="absolute inset-0 transition-opacity duration-200"
            style={{backgroundImage:`url(${bgUrl})`, backgroundSize:'cover', backgroundPosition:'center', opacity:bgLoaded?1:0}}
          ></div>
          <div className="absolute inset-0 bg-gradient-to-b from-black/25 via-black/25 to-black/55"></div>

          {me.dailyAvailable && (
            <button
              onClick={onClaimDaily}
              className="absolute top-3 right-3 z-10 px-3 py-1 rounded-lg glass flex items-center gap-1 text-sm transform origin-top-right scale-[1.33]"
            >
              <span>🎁</span>
              <span>{t('gift')}</span>
            </button>
          )}

          {/* Удочка (спрайт) + леска */}
          <img
            src={ROD_IMG}
            alt="rod"
            className="absolute select-none pointer-events-none"
            style={{ left: rodLeft, top: rodTop, width: rodW, height: rodH }}
            loading="eager"
            decoding="async"
          />
          <svg className="absolute inset-0" width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
            <path d={linePath} stroke="#e6e6e6" strokeWidth="2" fill="none" opacity="0.95"/>
          </svg>

          {/* Поплавок */}
          <div className="absolute" style={{left: floatPx.x-12, top: floatPx.y-12, width: 24, height: 24}}>
            <img src="/app/assets/riverking_bobber.svg" alt="bobber" className={`relative w-6 h-6 drop-shadow ${bobberAnim}`}/>
            {showRipple && <div className="absolute inset-0 rounded-full ripple"></div>}
          </div>

          {/* На десктопе CTA поверх сцены; на мобиле — ниже (см. ниже) */}
          <div className="absolute bottom-0 left-0 right-0 p-4 pb-safe justify-center hidden md:flex">
            {!casting ? (
              <button onClick={onCast} className="w-full md:w-1/2 py-4 rounded-2xl bg-emerald-600 hover:bg-emerald-500 text-lg font-semibold shadow-lg">{t('castRod')}</button>
            ) : biting ? (
              <button onClick={onHook} className="w-full md:w-1/2 py-4 rounded-2xl bg-red-600 hover:bg-red-500 text-lg font-semibold shadow-lg">{t('hook')}</button>
            ) : (
              <div className="glass w-full md:w-1/2 py-4 rounded-2xl text-center">
                <div className="mx-auto h-6 w-6 rounded-full border-2 border-white/50 border-t-transparent animate-spin mb-2"></div>
                <div className="opacity-90">{t('waitingBite')}</div>
              </div>
            )}
          </div>
          {me.autoFish && (
            <button
              type="button"
              className="absolute bottom-3 right-3 z-10 flex items-center gap-1 glass px-2 py-1 rounded-lg text-xs cursor-pointer"
              onClick={()=>{
                const checked = !autoCastRef.current;
                autoCastRef.current = checked;
                if(!checked){
                  clearTimeout(autoCastTimeoutRef.current);
                  autoCastTimeoutRef.current = null;
                }
                setAutoCast(checked);
              }}
            >
              <span className={"w-3 h-3 rounded-sm border border-white/50 bg-transparent flex items-center justify-center " + (autoCast ? "bg-emerald-500" : "") }>
                <svg viewBox="0 0 14 14" className={"w-2 h-2 text-black " + (autoCast ? "opacity-100" : "opacity-0")} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <polyline points="3 7 6 10 11 4" />
                </svg>
              </span>
              <span>{t('autoCast')}</span>
            </button>
          )}
        </div>
      );
    }

    function App(){
      const tg = window.Telegram?.WebApp;
      console.log('initData length:', tg?.initData?.length || 0, 'platform:', tg?.platform);
      const refToken = new URLSearchParams(window.location.search).get('ref');
      const tgParam = (()=>{
        try{
          const raw = window.location.search + window.location.hash;
          const m = raw.match(/(?:^|[?&#])tgWebAppData=([^&]+)/);
          return m ? decodeURIComponent(m[1]) : null;
        }catch{ return null; }
      })();
      const [me,setMe] = React.useState(null);
      const [loading,setLoading] = React.useState(true);
      const [loadingHint] = React.useState(()=>{
        const hints = [t('hintFastBite'), t('hintWaitRare'), t('hintTapPrize'), t('hintAutoCatch'), t('hintNoCloseRod')];
        return hints[Math.floor(Math.random()*hints.length)];
      });
      const [casting,setCasting] = React.useState(false);
      const castingRef = React.useRef(false);
      const [biting,setBiting] = React.useState(false);
      const bitingRef = React.useRef(false);
      const waitRef = React.useRef(0);
      const biteTimeRef = React.useRef(0);
      const hookTimeoutRef = React.useRef(null);
      const [result,setResult] = React.useState(null);
      const [error,setError] = React.useState(null);
      const [drawerOpen, setDrawerOpen] = React.useState(false);
      const [baitsOpen, setBaitsOpen] = React.useState(false);
      const [tab, setTab] = React.useState('fish');
      const [shop,setShop] = React.useState([]);
      const [currentTournament,setCurrentTournament] = React.useState(null);
      const [upcomingTournaments,setUpcomingTournaments] = React.useState([]);
      const [pastTournaments,setPastTournaments] = React.useState([]);
      const [pastResult,setPastResult] = React.useState(null);
      const [tournamentTab,setTournamentTab] = React.useState('current');
      const [nickOpen,setNickOpen] = React.useState(false);
      const [prize,setPrize] = React.useState(null);
      const [prizeHint,setPrizeHint] = React.useState(null);
      const [dailyOpen,setDailyOpen] = React.useState(false);
      const [refOpen,setRefOpen] = React.useState(false);
      const [refInfo,setRefInfo] = React.useState(null);
      const [autoCast,setAutoCast] = React.useState(()=>{ try{ return localStorage.getItem('autoCast')==='1'; }catch(e){ return false; }});
      const autoCastRef = React.useRef(autoCast);
      const autoCastTimeoutRef = React.useRef(null);
      React.useEffect(()=>{
        autoCastRef.current = autoCast;
        if(!me?.autoFish) setAutoCast(false);
        if(!autoCast){
          clearTimeout(autoCastTimeoutRef.current);
          autoCastTimeoutRef.current = null;
        }
      }, [autoCast, me?.autoFish]);
      React.useEffect(()=>{ try{ localStorage.setItem('autoCast', autoCast?'1':'0'); }catch(e){} }, [autoCast]);

      function tournamentFish(name, rarity){
        if(!rarity) return t('anyFish');
        const cls = rarityColors[rarity]||'';
        if(name) return <span className={cls}>{name}</span>;
        const lang = document.documentElement.lang;
        const rn = rarityNames[lang] || rarityNames.ru;
        return <span className={cls}>{(rn[rarity]||rarity)} {t('fishWord')}</span>;
      }

      React.useEffect(()=>{
        if(currentTournament?.mine){
          setTimeout(()=>{
            document.getElementById('current-tournament-mine')?.scrollIntoView({block:'center'});
          },0);
        }
      },[currentTournament]);

      React.useEffect(()=>{
        if(pastResult?.mine){
          setTimeout(()=>{
            document.getElementById('past-tournament-mine')?.scrollIntoView({block:'center'});
          },0);
        }
      },[pastResult]);

      React.useEffect(()=>{
        try{ tg?.ready(); tg?.expand(); tg?.MainButton?.hide?.(); tg?.enableClosingConfirmation?.(); }catch(e){}
        try{
          Object.values(LOCATION_BG)
            .concat([ROD_IMG, '/app/assets/riverking_bobber.svg'])
            .forEach(src=>{ new Image().src = src; });
        }catch(e){}
        (async()=>{
          setLoading(true);
          try{
            const initData = tg?.initData || tgParam;
            if(initData){
              await fetch(`/api/auth/telegram${refToken?`?ref=${refToken}`:''}`, {
                method:'POST',
                headers:{'Telegram-Init-Data': initData},
                credentials:'include'
              });
            }
          }catch(e){}
          try{
            const r = await fetch(`/api/me`, {credentials:'include'});
            if(!r.ok){
              if(r.status===401) throw new Error('unauthorized');
              throw new Error('me failed');
            }
            const d = await r.json();
            t = makeT(d.language);
            document.documentElement.lang = d.language;
            try{ localStorage.setItem('lang', d.language); }catch(e){}
            setMe(d);
              try{
                const s = await fetch(`/api/shop`,{credentials:'include'});
                if(!s.ok){
                  if(s.status===401) throw new Error('unauthorized');
                } else {
                  setShop(await s.json());
                }
              }catch(e){
                if(e.message==='unauthorized'){
                  setError(t('authRequired'));
                  setShop([]);
                }
              }
              try{
                const ct = await fetch(`/api/tournament/current`,{credentials:'include'});
                if(ct.status===200){
                  setCurrentTournament(await ct.json());
                } else {
                  setCurrentTournament(null);
                }
                const ut = await fetch(`/api/tournaments/upcoming`,{credentials:'include'});
                if(ut.status===200){
                  setUpcomingTournaments(await ut.json());
                } else {
                  setUpcomingTournaments([]);
                }
                const pt = await fetch(`/api/tournaments/past`,{credentials:'include'});
                if(pt.status===200){
                  setPastTournaments(await pt.json());
                } else {
                  setPastTournaments([]);
                }
                const pr = await fetch(`/api/prizes`,{credentials:'include'});
                if(pr.ok){
                  const list = await pr.json();
                  if(list.length>0) setPrize(list[0]);
                }
              }catch(e){
                if(e.message==='unauthorized'){
                  setError(t('authRequired'));
                  setCurrentTournament(null);
                  setUpcomingTournaments([]);
                  setPastTournaments([]);
                }
              }
            }catch(e){
              if(e.message==='unauthorized'){
                setError(t('authRequired'));
                setShop([]);
              } else {
                setError(t('loadProfileFailed'));
                t = makeT(initLang); document.documentElement.lang = initLang; try{ localStorage.setItem('lang', initLang); }catch(e){}
                setMe({
                  username:'angler',
                  needsNickname:false,
                  language:initLang,
                  lures:[
                    {id:1,name:'Пресная мирная',qty:5,predator:false,water:'fresh',rarityBonus:0},
                    {id:2,name:'Пресная хищная',qty:5,predator:true,water:'fresh',rarityBonus:0},
                    {id:3,name:'Морская мирная',qty:5,predator:false,water:'salt',rarityBonus:0},
                    {id:4,name:'Морская хищная',qty:5,predator:true,water:'salt',rarityBonus:0},
                    {id:5,name:'Пресная мирная+',qty:2,predator:false,water:'fresh',rarityBonus:0.3},
                    {id:6,name:'Пресная хищная+',qty:2,predator:true,water:'fresh',rarityBonus:0.3},
                    {id:7,name:'Морская мирная+',qty:2,predator:false,water:'salt',rarityBonus:0.3},
                    {id:8,name:'Морская хищная+',qty:2,predator:true,water:'salt',rarityBonus:0.3},
                  ],
                  currentLureId:1,
                  totalWeight:0, todayWeight:0, locationId:1,
                  locations:[
                    {id:1,name:'Пруд',unlockKg:0,unlocked:true},
                    {id:2,name:'Река',unlockKg:10,unlocked:false},
                    {id:3,name:'Озеро',unlockKg:50,unlocked:false},
                  ],
                  caughtFishIds:[],
                  recent:[], dailyAvailable:true, dailyStreak:0,
                });
                setShop([]);
              }
            }finally{ setLoading(false); }
        })();
      },[]);

      React.useEffect(()=>{
        if(me?.needsNickname){
          setNickOpen(true);
        }
      },[me?.needsNickname]);

      React.useEffect(()=>{
        if(tournamentTab!=='past') setPastResult(null);
      },[tournamentTab]);

      async function claimPrize(){
        if(!prize) return;
        try{
          await fetch(`/api/prizes/${prize.id}/claim`,{method:'POST',credentials:'include'});
          const r = await fetch(`/api/me`,{credentials:'include'});
          if(r.ok) setMe(await r.json());
        }catch(e){}
        setPrize(null);
      }

      async function openPast(id){
        setPastResult(null);
        try{
          const r = await fetch(`/api/tournament/${id}`,{credentials:'include'});
          if(r.status===200){
            setPastResult(await r.json());
          }
        }catch(e){}
      }

      async function claimDaily(){
        setError(null);
        try{
          const r = await fetch(`/api/daily`,{method:'POST',credentials:'include'});
          if(!r.ok){
            if(r.status===401) throw new Error('unauthorized');
            throw 0;
          }
          const d = await r.json();
          setMe(p=>({
            ...p,
            lures: d.lures,
            currentLureId:d.currentLureId,
            dailyAvailable:false,
            dailyStreak:d.dailyStreak
          }));
          setDailyOpen(false);
        }catch(e){
          setError(e.message==='unauthorized'
            ? t('authRequired')
            : t('dailyTaken'));
        }
      }

      function openDaily(){
        setDailyOpen(true);
      }

      async function loadReferrals(){
        try{
          const r = await fetch(`/api/referrals`,{credentials:'include'});
          if(r.ok) setRefInfo(await r.json());
        }catch(e){}
      }

      async function generateRefLink(){
        try{
          const r = await fetch(`/api/referrals`,{method:'POST',credentials:'include'});
          if(r.ok){
            const d = await r.json();
            setRefInfo(p=>({invited:p?.invited || [], token:d.token}));
          }
        }catch(e){}
      }

      async function copyRefLink(){
        if(!refInfo) return;
        const link = `${window.location.origin}/app?ref=${refInfo.token}`;
        try{ await navigator.clipboard.writeText(link); }catch(e){}
      }

      function toggleRef(){
        setRefOpen(o=>{
          const n=!o; if(n && !refInfo) loadReferrals(); return n;
        });
      }

      async function buyPack(id){
        setError(null);
        try{
          const initData = tg?.initData;
          const r = await fetch('/api/create-invoice',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({productId:id, initData})
          });
          if(!r.ok){
            if(r.status===401) throw new Error('unauthorized');
            throw 0;
          }
          const {invoice_url} = await r.json();
          tg?.openInvoice(invoice_url, async (status)=>{
            if(status==='paid'){
              try{
                const meResp = await fetch(`/api/me`,{credentials:'include'});
                if(meResp.ok){
                  setMe(await meResp.json());
                }
                const shopResp = await fetch(`/api/shop`,{credentials:'include'});
                if(shopResp.ok){
                  setShop(await shopResp.json());
                }
              }catch(err){}
            }
          });
        }catch(e){
          setError(e.message==='unauthorized'
            ? t('authRequired')
            : t('purchaseFailed'));
        }
      }

      async function selectLocation(id){
        setError(null);
        try{
          const r = await fetch(`/api/location/`+id,{method:'POST',credentials:'include'});
          if(!r.ok){
            if(r.status===401) throw new Error('unauthorized');
            throw r.status;
          }
          setMe(p=>({...p,locationId:id}));
        }catch(e){
          setError(e.message==='unauthorized'
            ? t('authRequired')
            : e===403? t('locationLocked') : t('changeLocationFailed'));
        }
      }

      function saveNickname(nick){
        nick = (nick||'').replace(/[\u200E\u200F\u202A-\u202E\u2066-\u2069]/g,'').slice(0,30);
        if(!nick || nick===me?.username){
          setNickOpen(false);
          return;
        }
        fetch('/api/nickname',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({nickname:nick})})
          .then(()=> setMe(p=>({...p, username:nick, needsNickname:false})))
          .catch(()=>{})
          .finally(()=> setNickOpen(false));
      }

      async function toggleLanguage(){
        const newLang = me.language==='ru' ? 'en' : 'ru';
        try{
          await fetch('/api/language',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({language:newLang})});
          const r = await fetch(`/api/me`,{credentials:'include'});
          if(r.ok){
            const m = await r.json();
            t = makeT(m.language);
            document.documentElement.lang = m.language;
            try{ localStorage.setItem('lang', m.language); }catch(e){}
            setMe(m);
          }
          const s = await fetch(`/api/shop`,{credentials:'include'});
          if(s.ok){ setShop(await s.json()); }
          const ct = await fetch(`/api/tournament/current`,{credentials:'include'});
          if(ct.status===200){ setCurrentTournament(await ct.json()); } else { setCurrentTournament(null); }
          const ut = await fetch(`/api/tournaments/upcoming`,{credentials:'include'});
          if(ut.status===200){
            setUpcomingTournaments(await ut.json());
          } else {
            setUpcomingTournaments([]);
          }
          const pt = await fetch(`/api/tournaments/past`,{credentials:'include'});
          if(pt.status===200){
            setPastTournaments(await pt.json());
          } else {
            setPastTournaments([]);
          }
        }catch(e){}
      }

      async function cast(){
        if(castingRef.current) return; if(!me) return;
        const curId = me.currentLureId;
        const curLure = me.lures.find(l=>l.id===curId);
        if(!curLure || curLure.qty<=0){ setError(t('noBaits')); return; }
        setError(null);
        setDrawerOpen(false);
        setBaitsOpen(false);
        try{
          const r = await fetch(`/api/start-cast`,{method:'POST',credentials:'include'});
          if(!r.ok){
            if(r.status===401) throw new Error('unauthorized');
            const e=await r.json().catch(()=>({}));
            throw new Error(e.error||'failed');
          }
          const {currentLureId} = await r.json();
          setMe(p=>({
            ...p,
            currentLureId,
            lures:p.lures.map(l=> l.id===curId ? {...l,qty:Math.max(0,l.qty-1)} : l)
          }));
        }catch(e){
          setError(e.message==='unauthorized'
            ? t('authRequired')
            : e.message==='failed'? t('castFailed')
            : e.message==='casting'? t('alreadyCasting')
            : e.message==='No suitable fish'? t('noSuitableFish')
            : (e.message||t('wrongLure')));
          return;
        }
        castingRef.current = true;
        setCasting(true);
        setResult(null);
        const wait = 5 + Math.floor(Math.random()*26);
        waitRef.current = wait;
        await new Promise(r=>setTimeout(r, wait*1000));
        biteTimeRef.current = Date.now();
        setBiting(true);
        bitingRef.current = true;
        hookTimeoutRef.current = setTimeout(()=>hook(true),5000);
      }

      async function hook(auto=false){
        if(!bitingRef.current) return;
        const reaction = auto ? 5.1 : (Date.now()-biteTimeRef.current)/1000;
        clearTimeout(hookTimeoutRef.current);
        setBiting(false);
        bitingRef.current = false;
        let caught=false;
        let autoFishActive = me.autoFish;
        try{
          const r=await fetch(`/api/cast`,{
            method:'POST', credentials:'include',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({wait:waitRef.current,reaction})
          });
          if(!r.ok){
            if(r.status===401) throw new Error('unauthorized');
            throw 0;
          }
          const d=await r.json();
          caught=d.caught;
          autoFishActive = d.autoFish;
          setMe(p=>({...p,autoFish:d.autoFish}));
          if(!d.autoFish) setAutoCast(false);
          if(d.caught){
            const c=d.catch;
            const isNewFish = !(me.caughtFishIds||[]).includes(c.fishId);
            const newTotal = (me.totalWeight||0)+c.weight;
            const newLocs = me.locations.filter(l=>!l.unlocked && newTotal>=l.unlockKg).map(l=>l.name);
            setResult({...c,newFish:isNewFish,newLocations:newLocs});
            setMe(p=>{
              const tot=(p.totalWeight||0)+c.weight;
              return {
                ...p,
                totalWeight:tot,
                todayWeight:(p.todayWeight||0)+c.weight,
                locations:p.locations.map(l=> l.unlocked || tot>=l.unlockKg ? {...l,unlocked:true} : l),
                recent:[{fish:c.fish,weight:c.weight,location:c.location,rarity:c.rarity,at:new Date().toISOString()},...(p.recent||[])].slice(0,5),
                caughtFishIds: isNewFish ? [...(p.caughtFishIds||[]), c.fishId] : p.caughtFishIds
              };
            });
            try{
              const ct = await fetch(`/api/tournament/current`,{credentials:'include'});
              if(ct.status===200){
                setCurrentTournament(await ct.json());
              } else {
                setCurrentTournament(null);
              }
            }catch(e){}
          } else {
            setError(t('fishEscaped'));
          }
        }catch(e){
          setError(e.message==='unauthorized'
            ? t('authRequired')
            : t('castOften'));
        }finally{
          castingRef.current = false;
          setCasting(false);
          if(caught && autoCastRef.current && autoFishActive){
            autoCastTimeoutRef.current = setTimeout(()=>cast(),1000);
          }
        }
      }

      if(loading){
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="animate-pulse text-center">
              <div className="text-2xl font-semibold">RiverKing</div>
              <div className="opacity-70 mt-2">{loadingHint}</div>
            </div>
          </div>
        );
      }

      if(!me){
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="text-2xl font-semibold">RiverKing</div>
              <div className="opacity-70 mt-2">{error || t('loadFailed')}</div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen w-full px-4 pb-20" onClick={()=>setPrizeHint(null)}>
        {prize && (
            <div className="fixed inset-0 flex items-center justify-center bg-black/70 z-50" onClick={claimPrize}>
              <div className="glass p-6 rounded-xl text-center animate-pop">
                <img src="/app/assets/riverking_bobber.svg" alt="prize" className="w-20 h-20 mx-auto mb-3 animate-bounce" />
                <div className="mb-2">{t('prizeCongrats', prize.rank)}</div>
                <div className="text-lg font-semibold mb-1">
                  {
                    (
                      shop
                        .reduce((acc, c) => acc.concat(c.packs), [])
                        .find(p => p.id === prize.packageId)?.name
                    ) || prize.packageId
                  } x{prize.qty}
                </div>
                <div className="text-sm opacity-80 mt-2">{t('tapToClaim')}</div>
              </div>
            </div>
          )}
        {/* prizeHint tooltip handled per-card */}
          <Header me={me} lang={me.language} onEditNickname={()=>setNickOpen(true)} onOpenLocations={!casting ? ()=>setDrawerOpen(true) : undefined} onOpenBaits={!casting ? ()=>setBaitsOpen(true) : undefined} onToggleLanguage={toggleLanguage} />
          {nickOpen && <NicknameModal me={me} onClose={()=>setNickOpen(false)} onSave={saveNickname} />}
          {dailyOpen && <DailyModal streak={me.dailyStreak} available={me.dailyAvailable} onClose={()=>setDailyOpen(false)} onClaim={claimDaily} />}

          {tab === 'fish' && (
            <>
              {/* Сцена */}
              <div className="mt-4">
                <FishingStage me={me} setMe={setMe} casting={casting} biting={biting} onCast={cast} onHook={()=>hook(false)} onClaimDaily={openDaily} autoCast={autoCast} setAutoCast={setAutoCast} autoCastRef={autoCastRef} autoCastTimeoutRef={autoCastTimeoutRef} />
              </div>

              {/* Мобильный CTA под сценой */}
              <div className="md:hidden mt-3">
                {!casting ? (
                  <button onClick={cast} className="w-full py-4 rounded-2xl bg-emerald-600 hover:bg-emerald-500 text-lg font-semibold shadow-lg">{t('castRod')}</button>
                ) : biting ? (
                  <button onClick={()=>hook(false)} className="w-full py-4 rounded-2xl bg-red-600 hover:bg-red-500 text-lg font-semibold shadow-lg">{t('hook')}</button>
                ) : (
                  <div className="glass w-full py-4 rounded-2xl text-center">
                    <div className="mx-auto h-6 w-6 rounded-full border-2 border-white/50 border-t-transparent animate-spin mb-2"></div>
                    <div className="opacity-90">{t('waitingBite')}</div>
                  </div>
                )}
              </div>

              {/* Результат / Ошибка */}

                <button onClick={()=>setTab('achievements')} className={`flex-1 py-3 whitespace-nowrap ${tab==='achievements'?'text-emerald-400':''}`}>{t('ratings')}</button>
              <button onClick={()=>setTab('guide')} className={`flex-1 py-3 whitespace-nowrap ${tab==='guide'?'text-emerald-400':''}`}>{t('guide')}</button>
              <button onClick={()=>setTab('shop')} className={`flex-1 py-3 whitespace-nowrap ${tab==='shop'?'text-emerald-400':''}`}>{t('shop')}</button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
