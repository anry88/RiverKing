<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RiverKing — Mini App (Fishing-first)</title>

  <!-- Telegram + libs -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Preload key assets (Ktor serves under /app) -->
  <link rel="preload" as="image" href="/app/assets/riverking_bg_pond_1600x900.png">
  <link rel="preload" as="image" href="/app/assets/riverking_bg_river_1600x900.png">
  <link rel="preload" as="image" href="/app/assets/riverking_bg_lake_1600x900.png">
  <link rel="preload" as="image" href="/app/assets/riverking_bg_swamp_1600x900.png">
  <link rel="preload" as="image" href="/app/assets/riverking_bg_mountain_river_1600x900.png">
  <link rel="preload" as="image" href="/app/assets/riverking_bg_reservoir_1600x900.png">
  <link rel="preload" as="image" href="/app/assets/riverking_bg_river_delta_1600x900.png">
  <link rel="preload" as="image" href="/app/assets/riverking_bg_sea_coast_1600x900.png">
  <link rel="preload" as="image" href="/app/assets/riverking_bg_fjord_1600x900.png">
  <link rel="preload" as="image" href="/app/assets/riverking_rod_right_v2.png">

  <style>
    :root{ --tg-bg:#0e0f13; --overlay: rgba(0,0,0,.35); }
    body{ background: var(--tg-bg); color: #fff; }

    .no-scrollbar::-webkit-scrollbar{ display:none; }
    .no-scrollbar{ -ms-overflow-style:none; scrollbar-width:none; }

    @keyframes bob { 0%{ transform: translateY(0);} 50%{ transform: translateY(-6px);} 100%{ transform: translateY(0);} }
    @keyframes bite { 0%{ transform: translateY(0) rotate(0);} 25%{ transform: translateY(10px) rotate(-6deg);} 50%{ transform: translateY(-4px) rotate(6deg);} 75%{ transform: translateY(8px) rotate(-4deg);} 100%{ transform: translateY(0) rotate(0);} }
    @keyframes ripple { 0%{ opacity:.5; transform: scale(0.8);} 100%{ opacity:0; transform: scale(2.3);} }
    .ripple::before,.ripple::after{ content:""; position:absolute; inset:-6px; border-radius:9999px; border:2px solid rgba(255,255,255,.35); animation:ripple 2.2s linear infinite; }
    .ripple::after{ animation-delay:1.1s; }

    .glass{ background: linear-gradient( to bottom, rgba(255,255,255,.08), rgba(255,255,255,.04) ); box-shadow: 0 10px 30px rgba(0,0,0,.25); backdrop-filter: blur(8px); border:1px solid rgba(255,255,255,.12); }
    .pb-safe{ padding-bottom: calc(1rem + env(safe-area-inset-bottom)); }
  </style>
</head>
<body class="min-h-screen">
<div id="root"></div>

<script type="text/babel">
    const API_URL = ""; // same origin

    // ====== Assets & UI constants ======
    const rarityColors = { uncommon: 'text-green-400', rare: 'text-blue-400', epic: 'text-purple-400', legendary: 'text-yellow-400' };
    const LOCATION_BG = {
      1: '/app/assets/riverking_bg_pond_1600x900.png', // Пруд (локальный ассет)
      2: '/app/assets/riverking_bg_river_1600x900.png', // Река
      3: '/app/assets/riverking_bg_lake_1600x900.png', // Озеро
      4: '/app/assets/riverking_bg_swamp_1600x900.png', // Болото
      5: '/app/assets/riverking_bg_mountain_river_1600x900.png', // Горная река
      6: '/app/assets/riverking_bg_reservoir_1600x900.png', // Водохранилище
      7: '/app/assets/riverking_bg_river_delta_1600x900.png', // Дельта реки
      8: '/app/assets/riverking_bg_sea_coast_1600x900.png', // Прибрежье моря
      9: '/app/assets/riverking_bg_fjord_1600x900.png'', // Фьорд
    };
    // Спрайт удочки (правая ориентация)
    const ROD_IMG = '/app/assets/riverking_rod_right_v2.png';
    const ROD_TIP_ANCHOR  = { x: 0.285, y: 0.18 }; // где тюльпан внутри спрайта 1200x1200
    const ROD_BASE_ANCHOR = { x: 0.58, y: 0.98 }; // ориентир «рукоять/основание» внутри спрайта (для выравнивания)
    // Новые пожелания:
    const ROD_SIZE_MULT = 1.5;       // УВЕЛИЧИТЬ в 1.5 раза от предыдущей логики
    const ROD_BASE_X_FRACTION = 2/3; // Начинать примерно в 2/3 ширины сцены

    const easeOutCubic = t => 1 - Math.pow(1 - t, 3);

    function useResizeObserver(ref){
      const [size,setSize] = React.useState({w:0,h:0});
      React.useEffect(()=>{
        if(!ref.current) return;
        const ro = new ResizeObserver(([entry])=>{
          const cr = entry.contentRect; setSize({w: cr.width, h: cr.height});
        });
        ro.observe(ref.current);
        return ()=> ro.disconnect();
      },[ref]);
      return size;
    }

    function StatChip({icon,label,value,active=false,onClick}){
      const Comp = onClick ? 'button' : 'div';
      return (
        <Comp onClick={onClick}
          className={`h-10 min-w-[92px] px-3 rounded-xl flex items-center gap-2 shrink-0 glass ${onClick?'hover:bg-white/10':''} ${active?'ring-1 ring-emerald-500':''}`}>
          {icon && <span className="text-base">{icon}</span>}
          <div className="leading-tight">
            <div className="text-[10px] uppercase opacity-70">{label}</div>
            <div className="text-sm font-semibold whitespace-nowrap">{value}</div>
          </div>
        </Comp>
      );
    }

    function Header({me,onClaimDaily,onOpenLocations}){
      const currentLoc = (me.locations.find(x=>x.id===me.locationId)||{}).name||'—';
      return (
        <div className="sticky top-0 z-40 -mx-4">
          <div className="px-4 py-3 backdrop-blur bg-black/30 border-b border-white/10 flex items-center justify-between">
            <div className="flex items-center gap-2">
              <span className="text-xl font-semibold">🎣 RiverKing</span>
              <span className="text-xs opacity-70">beta</span>
            </div>
          </div>
          <div className="px-4 py-2 bg-black/20 border-b border-white/10">
            <div className="flex items-stretch gap-2 overflow-x-auto no-scrollbar">
              <StatChip icon={'📍'} label="Локация" value={currentLoc} onClick={onOpenLocations} />
              <StatChip icon={'🪱'} label="Приманки" value={me.baits} />
              <StatChip icon={'🐟'} label="Всего" value={`${Number(me.totalWeight||0).toFixed(1)} кг`} />
              <StatChip icon={'📅'} label="Сегодня" value={`${Number(me.todayWeight||0).toFixed(1)} кг`} />
              {me.dailyAvailable && <StatChip icon={'🎁'} label="Daily" value={'+15'} onClick={onClaimDaily} />}
            </div>
          </div>
        </div>
      );
    }

    function LocationsDrawer({open, onClose, me, onSelect}){
      return (
        <div className={`fixed inset-0 z-50 ${open?'' :'pointer-events-none'}`}>
          <div onClick={onClose} className={`absolute inset-0 transition-opacity ${open? 'opacity-100':'opacity-0'} bg-black/60`}></div>
          <div className={`absolute right-0 top-0 h-full w-[88%] sm:w-[380px] glass transition-transform ${open? 'translate-x-0':'translate-x-full'} p-4 flex flex-col`}>
            <div className="flex items-center justify-between mb-3">
              <div className="text-lg font-semibold">Локации</div>
              <button onClick={onClose} className="px-3 py-1 rounded-xl hover:bg-white/10">✕</button>
            </div>
            <div className="space-y-2 overflow-y-auto pr-1">
              {me.locations.map(l=> (
                <button key={l.id} disabled={!l.unlocked}
                        onClick={()=>{ if(l.unlocked){ onSelect(l.id); onClose(); } }}
                        className={`w-full text-left p-3 rounded-xl border ${me.locationId===l.id? 'border-emerald-500 bg-emerald-500/10':'border-white/10 hover:bg-white/5'} ${!l.unlocked?'opacity-50 cursor-not-allowed':''}`}>
                  <div className="flex items-center justify-between">
                    <div>
                      <div className="font-semibold">{l.name}</div>
                      {l.unlocked? <div className="text-xs opacity-70">Открыто</div> : <div className="text-xs opacity-70">Требуется {l.unlockKg} кг</div>}
                    </div>
                    {me.locationId===l.id && <div className="text-emerald-400 text-sm">Текущая</div>}
                  </div>
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function FishingStage({me, casting, biting, onCast, onHook}){
      const stageRef = React.useRef(null);
      const {w,h} = useResizeObserver(stageRef);

      const WATER_TOP_REL = 0.48; // верх воды
      const shorePosRel = React.useMemo(()=>({x: 0.12, y: WATER_TOP_REL - 0.02}),[]); // поплавок на берегу
      const [floatRel, setFloatRel] = React.useState(shorePosRel);
      const [tension, setTension] = React.useState(0.2);

      const toPx = (rel)=>({ x: rel.x * w, y: rel.y * h });
      const floatPx = toPx(floatRel);

      // === Удочка (спрайт): больше на 1.5x и начало в 2/3 ширины ===
      const isSmall = w < 420;
      const isTablet = w >= 420 && w < 1024;

      // базовые лимиты занимаемой площади (как раньше)
      const targetWFrac = isSmall ? 0.70 : (isTablet ? 0.55 : 0.48);
      const targetHFrac = isSmall ? 0.92 : (isTablet ? 0.90 : 0.86);

      // базовый масштаб, затем умножаем на 1.5
      const rodScaleBase = Math.min((w * targetWFrac) / 1200, (h * targetHFrac) / 1200);
      const rodScale = rodScaleBase * ROD_SIZE_MULT;

      const rodW = 1200 * rodScale;
      const rodH = 1200 * rodScale;

      // База удочки должна начинаться примерно на 2/3 ширины сцены
      const baseDesiredX = w * ROD_BASE_X_FRACTION;
      const rodLeft = baseDesiredX - rodW * ROD_BASE_ANCHOR.x;

      // ручка «из экрана»
      const rodBottomOvershoot = Math.min( Math.max(h * 0.08, 50), 140 ); // чуть больше верхнего предела
      const rodTop = h - rodH + rodBottomOvershoot;

      // координаты тюльпана в сцене
      const tipX = rodLeft + rodW * ROD_TIP_ANCHOR.x;
      const tipY = rodTop  + rodH * ROD_TIP_ANCHOR.y;

      // леска от тюльпана к поплавку
      const ctrl = {
        x: (tipX + floatPx.x) / 2 - (isSmall ? 24 : 40),
        y: (tipY + floatPx.y) / 2 + (isSmall ? 50 : (60 + 120 * tension))
      };
      const linePath = `M ${tipX},${tipY} Q ${ctrl.x},${ctrl.y} ${floatPx.x},${floatPx.y}`;

      // tween поплавка
      const tweenTo = (toRel, ms=600)=>{
        const from = {...floatRel};
        const start = performance.now();
        const step = (now)=>{
          const t = Math.min(1, (now - start)/ms);
          const k = easeOutCubic(t);
          setFloatRel({ x: from.x + (toRel.x - from.x)*k, y: from.y + (toRel.y - from.y)*k });
          if(t<1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      };

      React.useEffect(()=>{
        if(casting){
          const tipRelX = tipX / w;
          const minX = Math.max(0.05, tipRelX - 0.20);
          const maxX = Math.max(minX, tipRelX - 0.05);
          const target = {
            x: minX + Math.random() * (maxX - minX),
            y: WATER_TOP_REL + 0.12 + Math.random() * 0.18,
          };
          setTension(0.15 + Math.random() * 0.25);
          tweenTo(target, 650);
        } else {
          setFloatRel(shorePosRel);
          setTension(0.18);
        }
      }, [casting, shorePosRel, tipX, w]);

      const bgUrl = LOCATION_BG[me.locationId] || LOCATION_BG[1];
      const bobberAnim = biting ? 'animate-[bite_0.6s_ease-in-out_infinite]' : (casting ? 'animate-[bob_3s_ease-in-out_infinite]' : '');
      const showRipple = casting && !biting;

      return (
        <div className="relative rounded-2xl overflow-hidden border border-white/10" ref={stageRef}
             style={{height:'56vh'}}>
          {/* Фон локации */}
          <div className="absolute inset-0" style={{backgroundImage:`url(${bgUrl})`, backgroundSize:'cover', backgroundPosition:'center'}}></div>
          <div className="absolute inset-0 bg-gradient-to-b from-black/25 via-black/25 to-black/55"></div>

          {/* Вода */}
          <div className="absolute left-0 right-0" style={{top:`${WATER_TOP_REL*100}%`, height:`${(1-WATER_TOP_REL)*100}%`, background:'linear-gradient(to bottom, rgba(0,40,60,.35), rgba(0,0,0,.55))'}}></div>

          {/* Удочка (спрайт) + леска */}
          <img
            src={ROD_IMG}
            alt="rod"
            className="absolute select-none pointer-events-none"
            style={{ left: rodLeft, top: rodTop, width: rodW, height: rodH }}
            loading="eager"
            decoding="async"
          />
          <svg className="absolute inset-0" width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
            <path d={linePath} stroke="#e6e6e6" strokeWidth="2" fill="none" opacity="0.95"/>
          </svg>

          {/* Поплавок */}
          <div className="absolute" style={{left: floatPx.x-12, top: floatPx.y-12, width: 24, height: 24}}>
            <div className={`relative w-6 h-6 rounded-full bg-red-500 border-2 border-white shadow-lg ${bobberAnim}`}></div>
            {showRipple && <div className="absolute inset-0 rounded-full ripple"></div>}
          </div>

          {/* На десктопе CTA поверх сцены; на мобиле — ниже (см. ниже) */}
          <div className="absolute bottom-0 left-0 right-0 p-4 pb-safe justify-center hidden md:flex">
            {!casting ? (
              <button onClick={onCast} className="w-full md:w-1/2 py-4 rounded-2xl bg-emerald-600 hover:bg-emerald-500 text-lg font-semibold shadow-lg">Забросить удочку</button>
            ) : biting ? (
              <button onClick={onHook} className="w-full md:w-1/2 py-4 rounded-2xl bg-red-600 hover:bg-red-500 text-lg font-semibold shadow-lg">Подсечь!</button>
            ) : (
              <div className="glass w-full md:w-1/2 py-4 rounded-2xl text-center">
                <div className="mx-auto h-6 w-6 rounded-full border-2 border-white/50 border-t-transparent animate-spin mb-2"></div>
                <div className="opacity-90">Ожидаем поклёвку…</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function App(){
      const tg = window.Telegram?.WebApp;
      const [me,setMe] = React.useState(null);
      const [loading,setLoading] = React.useState(true);
      const [casting,setCasting] = React.useState(false);
      const castingRef = React.useRef(false);
      const [biting,setBiting] = React.useState(false);
      const bitingRef = React.useRef(false);
      const waitRef = React.useRef(0);
      const biteTimeRef = React.useRef(0);
      const hookTimeoutRef = React.useRef(null);
      const [result,setResult] = React.useState(null);
      const [error,setError] = React.useState(null);
      const [drawerOpen, setDrawerOpen] = React.useState(false);

      React.useEffect(()=>{
        try{ tg?.ready(); tg?.expand(); tg?.MainButton?.hide?.(); tg?.enableClosingConfirmation?.(); }catch(e){}
        try{
          new Image().src = '/app/assets/riverking_bg_pond_1600x900.png';
          new Image().src = ROD_IMG;
        }catch(e){}
        (async()=>{
          setLoading(true);
          try{ if(tg?.initData){ await fetch(`/api/auth/telegram`, {method:'POST', body: tg.initData, credentials:'include'}); } }catch(e){}
          try{
            const r = await fetch(`/api/me`, {credentials:'include'});
            if(!r.ok) throw new Error('me failed');
            const d = await r.json(); setMe(d);
          }catch(e){
            setMe({
              username:'angler', baits:5, totalWeight:0, todayWeight:0, locationId:1,
              locations:[
                {id:1,name:'Пруд',unlockKg:0,unlocked:true},
                {id:2,name:'Река',unlockKg:10,unlocked:false},
                {id:3,name:'Озеро',unlockKg:50,unlocked:false},
              ],
              recent:[], dailyAvailable:true,
            });
          }finally{ setLoading(false); }
        })();
      },[]);

      async function claimDaily(){
        setError(null);
        try{
          const r = await fetch(`/api/daily`,{method:'POST',credentials:'include'});
          if(!r.ok) throw 0;
          const d = await r.json();
          setMe(p=>({...p,baits:p.baits+(d.baitsGranted||15),dailyAvailable:false}));
        }catch{ setError('Ежедневные приманки уже забраны.'); }
      }

      async function selectLocation(id){
        setError(null);
        try{
          const r = await fetch(`/api/location/`+id,{method:'POST',credentials:'include'});
          if(!r.ok) throw r.status;
          setMe(p=>({...p,locationId:id}));
        }catch(e){ setError(e===403?'Локация закрыта':'Не удалось сменить локацию'); }
      }

      async function cast(){
        if(castingRef.current) return; if(!me) return;
        if(me.baits<=0){ setError('Нет приманок. Забери ежедневные.'); return; }
        setError(null);
        castingRef.current = true;
        setCasting(true);
        setResult(null);
        const wait = 5 + Math.floor(Math.random()*26);
        waitRef.current = wait;
        await new Promise(r=>setTimeout(r, wait*1000));
        biteTimeRef.current = Date.now();
        setBiting(true);
        bitingRef.current = true;
        hookTimeoutRef.current = setTimeout(()=>hook(true),3000);
      }

      async function hook(auto=false){
        if(!bitingRef.current) return;
        const reaction = auto ? 3.1 : (Date.now()-biteTimeRef.current)/1000;
        clearTimeout(hookTimeoutRef.current);
        setBiting(false);
        bitingRef.current = false;
        try{
          const r=await fetch(`/api/cast`,{
            method:'POST', credentials:'include',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({wait:waitRef.current,reaction})
          });
          if(!r.ok) throw 0;
          const d=await r.json();
          if(d.caught){
            const c=d.catch;
            setResult(c);
            setMe(p=>{
              const newTotal=(p.totalWeight||0)+c.weight;
              return {
                ...p,
                baits:Math.max(0,p.baits-1),
                totalWeight:newTotal,
                todayWeight:(p.todayWeight||0)+c.weight,
                locations:p.locations.map(l=> l.unlocked || newTotal>=l.unlockKg ? {...l,unlocked:true} : l),
                recent:[{fish:c.fish,weight:c.weight,location:c.location,rarity:c.rarity,at:new Date().toISOString()},...(p.recent||[])].slice(0,5)
              };
            });
          } else {
            setError('Рыба сорвалась!');
            setMe(p=>({...p,baits:Math.max(0,p.baits-1)}));
          }
        }catch{
          setError('Слишком часто забрасываешь. Подожди пару секунд.');
        }finally{
          castingRef.current = false;
          setCasting(false);
        }
      }

      if(loading || !me){
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="animate-pulse text-center">
              <div className="text-2xl font-semibold">RiverKing</div>
              <div className="opacity-70 mt-2">Загружаем…</div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen w-full px-4 pb-8">
          <Header me={me} onClaimDaily={claimDaily} onOpenLocations={()=>setDrawerOpen(true)} />

          {/* Сцена */}
          <div className="mt-4">
            <FishingStage me={me} casting={casting} biting={biting} onCast={cast} onHook={()=>hook(false)} />
          </div>

          {/* Мобильный CTA под сценой */}
          <div className="md:hidden mt-3">
            {!casting ? (
              <button onClick={cast} className="w-full py-4 rounded-2xl bg-emerald-600 hover:bg-emerald-500 text-lg font-semibold shadow-lg">Забросить удочку</button>
            ) : biting ? (
              <button onClick={()=>hook(false)} className="w-full py-4 rounded-2xl bg-red-600 hover:bg-red-500 text-lg font-semibold shadow-lg">Подсечь!</button>
            ) : (
              <div className="glass w-full py-4 rounded-2xl text-center">
                <div className="mx-auto h-6 w-6 rounded-full border-2 border-white/50 border-t-transparent animate-spin mb-2"></div>
                <div className="opacity-90">Ожидаем поклёвку…</div>
              </div>
            )}
          </div>

          {/* Результат / Ошибка */}
          {result && (
            <div className="mt-4 p-4 rounded-xl glass">
              <div className="text-base">Улов!</div>
              <div className="text-lg font-bold mt-1"><span className={rarityColors[result.rarity]||''}>{result.fish}</span> — {Number(result.weight).toFixed(2)} кг</div>
              <div className="text-xs opacity-70">Локация: {result.location}</div>
            </div>
          )}
          {error && <div className="mt-3 text-sm text-red-300">{error}</div>}

          {/* Последние уловы */}
          <div className="mt-6">
            <div className="text-sm opacity-80 mb-2">Последние уловы</div>
            {(me.recent||[]).length===0 ? (
              <div className="text-sm opacity-60">Пока пусто — сделай первый заброс!</div>
            ) : (
              <div className="space-y-2">
                {me.recent.map((c,i)=> (
                  <div key={i} className="p-3 rounded--xl border border-white/10 flex items-center justify-between">
                    <div>
                      <div className={`font-medium ${rarityColors[c.rarity]||''}`}>{c.fish}</div>
                      <div className="text-xs opacity-70">{c.location} — {new Date(c.at).toLocaleString()}</div>
                    </div>
                    <div className="text-emerald-300 font-semibold">{Number(c.weight).toFixed(2)} кг</div>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Шторка локаций */}
          <LocationsDrawer open={drawerOpen} onClose={()=>setDrawerOpen(false)} me={me} onSelect={selectLocation} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
