<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RiverKing — Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root{ --tg-bg:#0e0f13; }
    body{ background: var(--tg-bg); color: #fff; }
  </style>
</head>
<body class="min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const API_URL = ""; // same origin
    function App(){
      const tg = window.Telegram?.WebApp;
      const [me,setMe] = React.useState(null);
      const [loading,setLoading] = React.useState(true);
      const [casting,setCasting] = React.useState(false);
      const [result,setResult] = React.useState(null);
      const [error,setError] = React.useState(null);

      React.useEffect(()=>{
        try{ tg?.ready(); tg?.expand(); tg?.MainButton?.hide?.(); tg?.enableClosingConfirmation?.(); }catch(e){}
        (async()=>{
          setLoading(true);
          try{
            if(tg?.initData){ await fetch(`/api/auth/telegram`, {method:'POST', body: tg.initData, credentials:'include'}); }
          }catch(e){}
          try{
            const r = await fetch(`/api/me`, {credentials:'include'});
            if(!r.ok) throw new Error('me failed');
            const d = await r.json();
            setMe(d);
          }catch(e){
            setMe({ username:'angler', baits:5, locationId:1, locations:[{id:1,name:'Пруд',desc:'Лёгкая рыбалка'},{id:2,name:'Река',desc:'Шанс на щуку'},{id:3,name:'Озеро',desc:'Глубоко, карп/щука'}], recent:[] });
          }finally{ setLoading(false); }
        })();
      },[]);

      async function claimDaily(){ setError(null); try{ const r=await fetch(`/api/daily`,{method:'POST',credentials:'include'}); if(!r.ok) throw 0; const d=await r.json(); setMe(p=>({...p,baits:p.baits+(d.baitsGranted||15)})); }catch{ setError('Ежедневные приманки уже забраны.'); } }
      async function selectLocation(id){ setError(null); try{ await fetch(`/api/location/`+id,{method:'POST',credentials:'include'}); setMe(p=>({...p,locationId:id})); }catch{ setError('Не удалось сменить локацию'); } }
      async function cast(){ if(!me) return; if(me.baits<=0){ setError('Нет приманок. Забери ежедневные.'); return; } setError(null); setCasting(true); setResult(null); await new Promise(r=>setTimeout(r,1200)); try{ const r=await fetch(`/api/cast`,{method:'POST',credentials:'include'}); if(!r.ok) throw 0; const d=await r.json(); setResult(d); setMe(p=>({...p,baits:Math.max(0,p.baits-1),recent:[{fish:d.fish,weight:d.weight,at:new Date().toISOString()},...(p.recent||[])].slice(0,5)})); }catch{ setError('Слишком часто забрасываешь. Подожди пару секунд.'); } finally{ setCasting(false); } }

      if(loading || !me){ return <div className="min-h-screen flex items-center justify-center"><div className="animate-pulse text-center"><div className="text-2xl font-semibold">RiverKing</div><div className="opacity-70 mt-2">Загружаем…</div></div></div>; }

      return (
        <div className="min-h-screen w-full px-4 pb-28">
          <div className="sticky top-0 -mx-4 px-4 py-3 backdrop-blur bg-black/20 border-b border-white/10 flex items-center justify-between">
            <div className="flex items-center gap-2"><span className="text-xl font-semibold">🎣 RiverKing</span><span className="text-xs opacity-70">beta</span></div>
            <div className="flex items-center gap-2">
              <div className="px-3 py-1 rounded-2xl bg-white/10">🪱 {me.baits}</div>
              <button onClick={claimDaily} className="px-3 py-1 rounded-2xl bg-emerald-600 hover:bg-emerald-500 text-sm">Daily +15</button>
            </div>
          </div>

          <div className="mt-4">
            <div className="text-sm opacity-80 mb-2">Локации</div>
            <div className="grid grid-cols-2 gap-3">
              {me.locations.map(l=> (
                <button key={l.id} onClick={()=>selectLocation(l.id)} className={`text-left p-4 rounded-2xl border ${me.locationId===l.id? 'border-emerald-500 bg-emerald-500/10':'border-white/10 hover:bg-white/5'}`}>
                  <div className="text-base font-semibold">{l.name}</div>
                  <div className="text-xs opacity-70 mt-1">{l.desc}</div>
                </button>
              ))}
            </div>
          </div>

          <div className="mt-6 p-4 rounded-2xl border border-white/10 bg-white/5">
            <div className="flex items-center justify-between">
              <div><div className="text-lg font-semibold">Текущая локация</div><div className="opacity-80 text-sm">{(me.locations.find(x=>x.id===me.locationId)||{}).name||'—'}</div></div>
              <div className="text-right"><div className="text-xs opacity-70">Приманка</div><div className="text-sm">Basic Bait</div></div>
            </div>
            <div className="mt-4 flex items-center justify-center">
              {!casting ? (
                <button onClick={cast} className="w-full md:w-1/2 py-4 rounded-2xl bg-emerald-600 hover:bg-emerald-500 text-lg font-semibold shadow-lg">Забросить удочку</button>
              ) : (
                <div className="flex flex-col items-center gap-3 py-6 w-full">
                  <div className="h-16 w-16 rounded-full bg-emerald-500/20 border border-emerald-500/50 flex items-center justify-center animate-bounce">🎯</div>
                  <div className="opacity-80">Ожидаем поклёвку…</div>
                </div>
              )}
            </div>
            {result && (
              <div className="mt-4 p-4 rounded-xl bg-black/40 border border-white/10">
                <div className="text-base">Улов!</div>
                <div className="text-lg font-bold mt-1">{result.fish} — {Number(result.weight).toFixed(2)} кг</div>
                <div className="text-xs opacity-70">Локация: {result.location}</div>
              </div>
            )}
            {error && <div className="mt-3 text-sm text-red-300">{error}</div>}
          </div>

          <div className="mt-6">
            <div className="text-sm opacity-80 mb-2">Последние уловы</div>
            {(me.recent||[]).length===0 ? (
              <div className="text-sm opacity-60">Пока пусто — сделай первый заброс!</div>
            ) : (
              <div className="space-y-2">
                {me.recent.map((c,i)=> (
                  <div key={i} className="p-3 rounded-xl border border-white/10 flex items-center justify-between">
                    <div>
                      <div className="font-medium">{c.fish}</div>
                      <div className="text-xs opacity-70">{new Date(c.at).toLocaleString()}</div>
                    </div>
                    <div className="text-emerald-300 font-semibold">{Number(c.weight).toFixed(2)} кг</div>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div className="h-24" />
          <div className="fixed inset-x-0 bottom-0 px-4 pb-5 pt-3 bg-gradient-to-t from-black/60 to-transparent">
            <div className="w-full flex gap-3">
              <button onClick={claimDaily} className="flex-1 py-3 rounded-2xl bg-white/10 border border-white/20">Daily +15</button>
              <button onClick={cast} className="flex-[2] py-3 rounded-2xl bg-emerald-600 hover:bg-emerald-500 font-semibold shadow-lg">Забросить</button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
